<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LottoPlay - Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🎰 LottoPlay</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Home</a></li>
                <li><a href="browse-tickets.html">Browse Tickets</a></li>
                <li><a href="winning-numbers.html">Winning Numbers</a></li>
                <li><a href="order-history.html">Order History</a></li>
            </ul>
            <div class="user-menu">
                <a href="profile.html" style="text-decoration: none; color: var(--text-primary);">
                    <div class="user-icon">👤</div>
                </a>
                <a href="index.html" class="btn btn-danger">Logout</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">My Profile</h2>

        <div class="grid grid-2">
            <!-- Profile Info Card -->
            <div class="card">
                <div class="card-body">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <div style="width: 100px; height: 100px; margin: 0 auto 1rem; background: linear-gradient(135deg, var(--accent-purple), var(--accent-orange)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem;">
                            👤
                        </div>
                        <h2 id="profile-header-name">User</h2>
                        <p class="text-muted">Member since May 2026</p>
                    </div>

                    <div style="padding: 1rem; background-color: var(--tertiary-dark); border-radius: 4px; margin-bottom: 1.5rem;">
                        <div class="stat-item">
                            <div class="stat-value" id="profile-tickets">0</div>
                            <div class="stat-label">Tickets Purchased</div>
                        </div>
                        <div style="margin: 1rem 0;"></div>
                        <div class="stat-item">
                            <div class="stat-value" id="profile-wins">0</div>
                            <div class="stat-label">Winning Tickets</div>
                        </div>
                        <div style="margin: 1rem 0;"></div>
                        <div class="stat-item">
                            <div class="stat-value" id="profile-winnings">$0.00</div>
                            <div class="stat-label">Total Winnings</div>
                        </div>
                    </div>

                    <button class="btn btn-primary" style="width: 100%;" onclick="openModal('edit-profile-modal')">Edit Profile</button>
                </div>
            </div>

            <!-- Account Details -->
            <div class="card">
                <div class="card-body">
                    <h3 class="mb-3">Account Information</h3>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profile-name" value="" disabled style="cursor: not-allowed; opacity: 0.7;">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="profile-email" value="" disabled style="cursor: not-allowed; opacity: 0.7;">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="profile-phone" value="" disabled style="cursor: not-allowed; opacity: 0.7;">
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="profile-address" disabled style="cursor: not-allowed; opacity: 0.7;"></textarea>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-btn" onclick="closeModal('edit-profile-modal')">&times;</span>
            <h2 class="mb-3">Edit Profile</h2>
            
            <form>
                <div class="form-group">
                    <label for="edit-name">Full Name</label>
                    <input type="text" id="edit-name" value="" required>
                </div>

                <div class="form-group">
                    <label for="edit-email">Email Address</label>
                    <input type="email" id="edit-email" value="" required disabled>
                </div>

                <div class="form-group">
                    <label for="edit-phone">Phone Number</label>
                    <input type="tel" id="edit-phone" value="" required>
                </div>

                <div class="form-group">
                    <label for="edit-address">Address</label>
                    <textarea id="edit-address" rows="3" required></textarea>
                </div>

                <button type="button" class="btn btn-primary" style="width: 100%;" onclick="saveProfile()">
                    Save Changes
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
