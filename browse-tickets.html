<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LottoPlay - Browse Tickets</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🎰 LottoPlay</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Home</a></li>
                <li><a href="browse-tickets.html">Browse Tickets</a></li>
                <li><a href="winning-numbers.html">Winning Numbers</a></li>
                <li><a href="order-history.html">Order History</a></li>
            </ul>
            <div class="user-menu">
                <a href="profile.html" style="text-decoration: none; color: var(--text-primary);">
                    <div class="user-icon">👤</div>
                </a>
                <a href="index.html" class="btn btn-danger">Logout</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <section class="mb-4">
            <h2 class="section-title">Browse Tickets</h2>
            <p class="text-muted">Choose a game to view details and purchase tickets.</p>
            <div class="card" style="margin-top: 1.5rem;">
                <div class="card-body">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="ticket-search-input">Search by ticket name</label>
                        <input type="text" id="ticket-search-input" placeholder="Search tickets...">
                    </div>
                </div>
            </div>
        </section>

        <!-- Tickets Grid -->
        <section>
            <div class="grid grid-4" id="tickets-grid"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
