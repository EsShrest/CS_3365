<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LottoPlay - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🎰 LottoPlay</div>
            <div class="user-menu">
                <a href="index.html" class="btn btn-secondary">Login</a>
            </div>
        </nav>
    </header>

    <div class="container-sm">
        <section>
            <div class="featured-section text-center">
                <h1 class="featured-title">Join LottoPlay</h1>
                <p class="featured-description">Create your account and start playing today. Win big with LottoPlay!</p>
            </div>

            <div class="form-container">
                <h2 class="text-center mb-4">Create Account</h2>
                
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                        <small class="error-message">Required field</small>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        <small class="error-message">Must be a valid email</small>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
                        <small class="error-message">Must be at least 10 digits</small>
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" rows="3" placeholder="123 Main Street, City, State" required></textarea>
                        <small class="error-message">Required field</small>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div style="position: relative; display: flex;">
                            <input type="password" id="password" name="password" placeholder="At least 8 characters" required style="flex: 1;">
                            <button type="button" id="password-toggle" onclick="togglePasswordVisibility('password', 'password-toggle')" 
                                    style="background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0 0.5rem;">👁️</button>
                        </div>
                        <small class="error-message">Min 8 chars, uppercase, lowercase, numbers</small>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div style="position: relative; display: flex;">
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter password" required style="flex: 1;">
                            <button type="button" id="confirm-password-toggle" onclick="togglePasswordVisibility('confirm-password', 'confirm-password-toggle')" 
                                    style="background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0 0.5rem;">👁️</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem; margin-top: 1.5rem;">Create Account</button>
                </form>

                <div style="text-align: center; color: var(--text-secondary);">
                    Already have an account? <a href="index.html" style="color: var(--accent-green); text-decoration: none;">Login here</a>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
